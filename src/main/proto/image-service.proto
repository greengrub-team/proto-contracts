syntax = "proto3";

package com.greengrub.image;   // Recommended: use your company + service + version

option java_multiple_files = true;
option java_package = "com.greengrub.proto.image";
option java_outer_classname = "ImageServiceProto";

// ========================================
// ENUMS
// ========================================

enum CreatorType {
    CUSTOMER = 0;
    FOOD_REQUEST = 1;
}

// ========================================
// MESSAGES
// ========================================

message Image {
  string image_id = 1;
  string creator_id = 2;
  CreatorType creator_type = 3;
  string image_url = 4;
  string created_date = 5;
}

message LocalImage {
  string image_id = 1;
  string creator_id = 2;
  CreatorType creator_type = 3;
  string file_name = 4;
  string content_type =5;
  bytes image_data = 6;
  string created_date = 7;
}

// ========================================
// REQUEST MESSAGES
// ========================================

message UploadImagesRequest {
  string creator_id = 1;                    // Common creator for all images in this batch
  CreatorType creator_type = 2;
  repeated bytes image_data = 3;            // List of raw image bytes (one per image)
}

message GetImagesByCreatorRequest {
  string creator_id = 1;                    // This is the shared customerId / foodRequestId
}

message DeleteImageByImageIdRequest {
  string image_id = 1;
}

message UploadLocalImageRequest {
  string file_name = 1;
  string content_type = 2;
  repeated bytes image_data = 3;
  string creator_id = 4;                    // Common creator for all images in this batch
  CreatorType creator_type = 5;
}

// ============================================================
//  RESPONSE MESSAGES
// ============================================================

message DeleteImageByImageIdResponse {
  string message = 1;
}

message UploadImagesResponse {
  string message = 1;
}

message GetImagesByCreatorResponse {
  repeated Image images = 1;                // List of raw image
}

message UploadLocalImageResponse {
  repeated LocalImage images = 1;  // List of raw image
}

// ========================================
// SERVICE DEFINITION
// ========================================
service ImageService {
  rpc UploadImages(UploadImagesRequest) returns (UploadImagesResponse);  // Batch upload multiple photos at once
  rpc GetImagesByCreator(GetImagesByCreatorRequest) returns (GetImagesByCreatorResponse);  // Get all photos for a given creator (customerId)
  rpc DeleteImagesByImageId(DeleteImageByImageIdRequest) returns (DeleteImageByImageIdResponse); // Delete Image by Image Id
  rpc GetImageByImageId(DeleteImageByImageIdRequest) returns (GetImagesByCreatorResponse); // Get Image By ImageId

  //For Local Storage
  rpc UploadLocalImages(UploadLocalImageRequest) returns(UploadLocalImageResponse);
  rpc GetLocalImagesByCreator(GetImagesByCreatorRequest) returns (UploadLocalImageResponse);
  rpc GetLocalImageByImageId(DeleteImageByImageIdRequest) returns (UploadLocalImageResponse);
}