syntax = "proto3";

package com.greengrub.proto.users;

option java_multiple_files = true;
option java_package = "com.greengrub.proto.users";
option java_outer_classname = "UserManagementServiceProto";

service UserManagementService {
  rpc GetUser (UserByIdRequest) returns (UserResponse);                // Get user by ID
  rpc GetUserByEmail (GetUserByEmailRequest) returns (UserResponse);  // Get user by email
  rpc CreateUser (CreateUserRequest) returns (UserResponse);          // Create a new user
  rpc UpdateUser (UpdateUserRequest) returns (UserResponse);          // Update existing user
  rpc DeleteUser (UserByIdRequest) returns (DeleteUserResponse);    // Delete user (soft delete)
  rpc ActivateUser (UserByIdRequest) returns (UserResponse);      // Activate user
  rpc DeactivateUser (UserByIdRequest) returns (UserResponse);                     // Deactivate user
  rpc VerifyCredentials (VerifyCredentialsRequest) returns (VerifyCredentialsResponse);  // Verify user credentials (for authentication)
  rpc ListUsers (ListUsersRequest) returns (ListUsersResponse);                          // List users with filters
}

// ============================================================
//  ENUMS
// ============================================================
enum UserRole {
  ROLE_UNSPECIFIED = 0;
  DONOR = 1;
  RECIPIENT = 2;
  ADMIN = 3;
}

enum CreatorType {
  CUSTOMER = 0;
  FOOD_REQUEST = 1;
}

// ============================================================
//  SHARED MESSAGES
// ============================================================

message User {
  string user_id = 1;
  string name = 2;
  string email = 3;
  string phone_number = 4;
  string address = 5;
  bool is_active = 6;
  UserRole role = 7;
  string created_at = 8;  // ISO-8601 timestamp
  string updated_at = 9;  // ISO-8601 timestamp
  optional Image image = 10; // user profile image
}

message Image {
  string id = 1;           // UUID as string
  string creator_id = 2;   // UUID as string
  string url = 3;          // GCP Storage URL
  optional string file_name = 4; // for local Image
  optional string content_type = 5; // for local Image
  optional bytes image_data = 6; // for local Images
}

// ============================================================
//  REQUEST MESSAGES
// ============================================================
message UserByIdRequest {
  string user_id = 1;
}

// Request message for getting a user by email
message GetUserByEmailRequest {
  string email = 1;
}

// Request message for creating a user
message CreateUserRequest {
  string name = 1;
  string email = 2;
  string password = 3;  // Will be hashed on server side
  string phone_number = 4;
  string address = 5;
  UserRole role = 6;
  optional Image image = 7;
}

// Request message for updating a user
message UpdateUserRequest {
  string user_id = 1;
  optional string name = 2;
  optional string email = 3;
  optional string phone_number = 4;
  optional string address = 5;
  optional UserRole role = 6;
  optional Image image = 7;
}

// Request message for verifying credentials
message VerifyCredentialsRequest {
  string email = 1;
  string password = 2;
}

// ============================================================
//  RESPONSE MESSAGES
// ============================================================

// Response message for credential verification
message VerifyCredentialsResponse {
  bool valid = 1;
  optional User user = 2;
  string message = 3;
}

// Request message for listing users
message ListUsersRequest {
  optional UserRole role = 1;
  optional bool is_active = 2;
  int32 page = 3;
  int32 page_size = 4;
}

// Response message for listing users
message ListUsersResponse {
  repeated User users = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
}

// Response message for user operations
message UserResponse {
  User user = 1;
}

// Response message for delete operation
message DeleteUserResponse {
  bool success = 1;
  string message = 2;
}